# Spring Boot Port
server.port=8080

# Database Configuration (Amazon RDS MySQL)
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME:localhost}:${RDS_PORT:3306}/${RDS_DBNAME:vpsrental}?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${RDS_USERNAME:root}
spring.datasource.password=${RDS_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# AWS Credentials and Region Configuration
aws.access-key=${AWS_ACCESS_KEY_ID}
aws.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION:ap-southeast-1}

# Amazon Cognito Configuration
aws.cognito.user-pool-id=${COGNITO_USER_POOL_ID}
aws.cognito.client-id=${COGNITO_CLIENT_ID}

# Spring Security OAuth2 Resource Server for JWT Verification
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.${AWS_REGION:ap-southeast-1}.amazonaws.com/${COGNITO_USER_POOL_ID}

# Amazon S3 Bucket Configuration
aws.s3.bucket-name=${S3_BUCKET_NAME}

# Amazon SNS Topic Configuration
aws.sns.topic-arn=${SNS_TOPIC_ARN}
