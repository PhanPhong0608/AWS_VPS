<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AWS VPS Rental</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="mode-panel">
        <div class="mode-info">
            <span>Environment Mode:</span>
            <span id="current-mode-badge" class="mode-badge mode-badge-mock">🔮 Demo Mode (Offline)</span>
        </div>
        <button id="toggle-mode-btn" class="mode-btn-toggle">Switch to Live Backend</button>
    </div>

    <div id="alert-banner"></div>

    <!-- NAVBAR -->
    <nav class="dashboard-nav">
        <div class="nav-brand">
            <span>⚡</span> AWS VPS Panel
        </div>
        <div class="nav-user">
            <div style="text-align: right;">
                <div id="user-display-name" style="font-weight: 700;">Loading...</div>
                <div id="user-display-email" style="font-size: 0.8rem; color: var(--text-muted);">Loading...</div>
            </div>
            <div class="avatar-wrapper" onclick="document.getElementById('avatar-file-input').click()">
                <img id="user-display-avatar" class="avatar-image" src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y" alt="Avatar">
            </div>
            <!-- Hidden avatar file input -->
            <input type="file" id="avatar-file-input" style="display: none;" accept="image/*">
            <button id="logout-btn" class="btn btn-secondary" style="width: auto; padding: 8px 16px; margin: 0;">Logout</button>
        </div>
    </nav>

    <!-- MAIN DASHBOARD CONTENT -->
    <main class="dashboard-main">
        
        <!-- LEFT COLUMN: VPS Instances & Rental -->
        <section style="display: flex; flex-direction: column; gap: 30px;">
            
            <!-- VPS Instance List -->
            <div class="panel-card">
                <div class="panel-header">
                    <h2>Rented VPS Instances</h2>
                    <button id="refresh-vps-list" class="btn btn-secondary" style="width: auto; padding: 6px 14px; margin: 0; font-size: 0.85rem;">🔄 Refresh</button>
                </div>
                
                <div id="vps-list-container" class="vps-grid">
                    <!-- Cards will be dynamically generated by JS -->
                    <div style="text-align: center; color: var(--text-muted); padding: 40px 0;">
                        Loading instances...
                    </div>
                </div>
            </div>

            <!-- Rent New VPS Form -->
            <div class="panel-card">
                <div class="panel-header">
                    <h2>Rent a New VPS</h2>
                </div>
                
                <form id="rent-vps-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group" style="grid-column: span 2;">
                        <label for="rent-name">VPS Name / Label</label>
                        <input type="text" id="rent-name" class="form-control" placeholder="production-db-server" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="rent-instance-type">Instance Type (AWS EC2)</label>
                        <select id="rent-instance-type" class="form-control">
                            <option value="t2.micro">t2.micro ($5.00 / month)</option>
                            <option value="t3.micro" selected>t3.micro ($8.00 / month)</option>
                            <option value="t3.medium">t3.medium ($20.00 / month)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="rent-os">Operating System</label>
                        <select id="rent-os" class="form-control">
                            <option value="UBUNTU">Ubuntu Server 22.04 LTS</option>
                            <option value="AMAZON_LINUX">Amazon Linux 2023</option>
                            <option value="WINDOWS">Windows Server 2022 Base</option>
                        </select>
                    </div>

                    <div style="grid-column: span 2; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px;">
                        <div>
                            <span style="color: var(--text-muted); font-size: 0.9rem;">Initial Monthly Cost:</span>
                            <div id="rent-price-display" style="font-size: 1.4rem; font-weight: 800; color: var(--success);">$8.00</div>
                        </div>
                        <button type="submit" class="btn" style="width: auto; margin-top: 0;">Provision Server</button>
                    </div>
                </form>
            </div>

        </section>

        <!-- RIGHT COLUMN: Wallet & Account Logs -->
        <section style="display: flex; flex-direction: column; gap: 30px;">
            
            <!-- Wallet Card -->
            <div class="panel-card">
                <div class="panel-header">
                    <h2>My Cloud Wallet</h2>
                </div>
                
                <div class="wallet-box">
                    <div class="balance-title">Current Balance</div>
                    <div class="balance-amount" id="user-display-balance">$0.00</div>
                </div>

                <!-- Sim Deposit Form -->
                <form id="deposit-form" style="display: flex; flex-direction: column; gap: 10px;">
                    <div class="form-group" style="margin-bottom: 5px;">
                        <label for="deposit-amount">Deposit Funds (Simulated)</label>
                        <input type="number" id="deposit-amount" class="form-control" placeholder="50.00" min="0.01" step="0.01" required>
                    </div>
                    <button type="submit" class="btn">Add Simulated Balance</button>
                </form>
            </div>

            <!-- Transaction History -->
            <div class="panel-card">
                <div class="panel-header">
                    <h2>Transaction Logs</h2>
                </div>
                
                <div class="tx-table-container">
                    <table class="tx-table">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-list-body">
                            <tr>
                                <td colspan="3" style="text-align: center; color: var(--text-muted);">No logs available</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </section>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
